# ─────────────────────────────────────────────────────────────────────────────
# CI/CD — zcop-log-agent (Go 1.22)
#
# Build:   Compile + vet on every push/PR
# Deploy:  Push to main/master → SCP binary to VPS → restart systemd service
#
# GitHub Secrets required (shared with zcop backend):
#   DEPLOY_SSH_KEY        — private key for the deploy user on the VPS
#   VPS_HOST              — hostname / IP of the production VPS
#   VPS_USER              — SSH username (e.g. root / deploy)
#   LOG_AGENT_MCP_TOKEN   — bearer token for MCP SSE auth (optional, open if unset)
#   LOG_AGENT_MCP_IPS     — comma-separated allowed IPs/CIDRs for MCP (optional)
#
# App directory on the VPS: /opt/zcop-log-agent
# Log directory:            /opt/zcop/logs  (read by the agent)
# Config override:          /opt/zcop-log-agent/config.json (optional)
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD — Log Agent

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── 1. Build & Vet ──────────────────────────────────────────────────────
  build:
    name: Build & Vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o logagent ./cmd/logagent

      - name: Upload artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: logagent-linux-amd64
          path: logagent
          retention-days: 5

  # ── 2. Deploy to VPS ────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: logagent-linux-amd64

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail

            APP_DIR="/opt/zcop-log-agent"
            DEPLOY_USER="${{ secrets.VPS_USER }}"

            echo "=== Deploying zcop-log-agent ==="

            mkdir -p "$APP_DIR"

            # ── Write .env if missing (printf avoids heredoc corruption by ssh-action) ──
            if [ ! -f "$APP_DIR/.env" ]; then
              printf 'LOG_AGENT_PORT=4080\nLOG_AGENT_AUTH_ENABLED=true\nLOG_AGENT_USERNAME=admin\nLOG_AGENT_PASSWORD=changeme\nLOG_AGENT_LOG_DIRS=/opt/zcop/logs\nLOG_AGENT_HOT_WINDOW=24h\nLOG_AGENT_MCP_PORT=4081\nLOG_AGENT_MCP_TOKEN=${{ secrets.LOG_AGENT_MCP_TOKEN }}\nLOG_AGENT_MCP_ALLOWED_IPS=${{ secrets.LOG_AGENT_MCP_IPS }}\n' > "$APP_DIR/.env"
              chmod 600 "$APP_DIR/.env"
              echo "Created default .env — update credentials before production use"
            else
              echo ".env already exists — skipping (edit manually on VPS)"
            fi

            # ── Write systemd unit (printf avoids heredoc corruption by ssh-action) ──
            printf '[Unit]\nDescription=ZCOP Log Agent\nAfter=network.target zcop.service\n\n[Service]\nUser=%s\nWorkingDirectory=%s\nExecStart=%s/logagent\nEnvironmentFile=-%s/.env\nRestart=on-failure\nRestartSec=5\n\n[Install]\nWantedBy=multi-user.target\n' "$DEPLOY_USER" "$APP_DIR" "$APP_DIR" "$APP_DIR" | sudo tee /etc/systemd/system/zcop-log-agent.service > /dev/null
            sudo systemctl daemon-reload
            sudo systemctl enable zcop-log-agent

      - name: Stop service before replacing binary
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            sudo systemctl stop zcop-log-agent 2>/dev/null || true

      - name: SCP binary to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: logagent
          target: /opt/zcop-log-agent/
          overwrite: true

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail

            APP_DIR="/opt/zcop-log-agent"

            # ── Make binary executable ──────────────────────────────────────
            chmod +x "$APP_DIR/logagent"

            # ── Create default config if missing (printf avoids heredoc corruption) ──
            if [ ! -f "$APP_DIR/config.json" ]; then
              printf '{\n  "port": 4080,\n  "auth_enabled": true,\n  "username": "admin",\n  "password": "changeme",\n  "log_dirs": ["/opt/zcop/logs"],\n  "max_entries": 1000000\n}\n' > "$APP_DIR/config.json"
              echo "Created default config.json — update password before production use"
            fi

            # ── Restart ────────────────────────────────────────────────────
            sudo systemctl reset-failed zcop-log-agent 2>/dev/null || true
            sudo systemctl restart zcop-log-agent

            # ── Health check ───────────────────────────────────────────────
            echo "Waiting for log agent to come up..."
            for i in $(seq 1 10); do
              sleep 1
              if curl -sf http://localhost:4080/api/health > /dev/null 2>&1; then
                echo "Log agent deployed successfully ✓"
                exit 0
              fi
            done

            echo "==== zcop-log-agent failed to start ===="
            sudo systemctl status zcop-log-agent.service --no-pager -l || true
            sudo journalctl -u zcop-log-agent.service --no-pager -n 30 || true
            exit 1
